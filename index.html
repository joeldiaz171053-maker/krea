<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador 3D - Accesorios iPhone</title>
    <!-- Importa el componente de Google -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; margin: 0; display: flex; height: 100vh; }
        .viewer-container { flex: 2; display: flex; justify-content: center; align-items: center; }
        .controls { flex: 1; background: white; padding: 30px; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        model-viewer { width: 100%; height: 80%; --poster-color: transparent; }
        .btn { padding: 10px 20px; margin: 5px; border: 1px solid #ccc; cursor: pointer; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="viewer-container">
        <!-- El visor 3D -->
        <model-viewer id="iphone-view" src="assets/models/iphone15pro.glb" camera-controls auto-rotate shadow-intensity="1">
        </model-viewer>
    </div>

    <div class="controls">
        <h2>Personaliza tu iPhone</h2>
        
        <h3>Color del Teléfono</h3>
        <button class="btn" onclick="cambiarColor('#5A5B5C')">Titanio Oscuro</button>
        <button class="btn" onclick="cambiarColor('#E3E2DE')">Titanio Blanco</button>

        <h3>Accesorio (Protector de Cámara)</h3>
        <button class="btn" onclick="toggleAccesorio(true)">Poner Protector 3D</button>
        <button class="btn" onclick="toggleAccesorio(false)">Quitar</button>
    </div>

    <script>
        const modelViewer = document.querySelector("#iphone-view");

        // Función para cambiar el color de un material específico del modelo
        function cambiarColor(colorHex) {
            modelViewer.addEventListener('load', () => {
                const material = modelViewer.model.materials.find(m => m.name === 'Cuerpo_iPhone');
                if (material) {
                    material.pbrMetallicRoughness.setBaseColorFactor(colorHex);
                }
            });
        }

        // Función para alternar la visibilidad del protector
        function toggleAccesorio(visible) {
            // Puedes alternar texturas o cargar un archivo .glb que ya incluya ambos y ocultar el nodo
            const modeloTextura = modelViewer.model.materials.find(m => m.name === 'Protector_Camara');
            if (modeloTextura) {
                // Cambias la opacidad o el estado
            }
        }
    </script>
</body>
</html>
