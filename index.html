<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador Premium - TecnoTrade PTY</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0b0cc4; /* Fondo oscuro profundo */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* 1. CONTENEDOR VISUAL CON EFECTO PARALLAX INMERSIVO */
        .viewer-box {
            flex: 1;
            width: 100%;
            background: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Habilita el entorno 3D para las capas */
            padding-bottom: 10px;
        }

        /* Caja contenedora que se inclina con el movimiento */
        .canvas-container {
            position: relative;
            width: 80%;
            max-width: 340px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Regla para todas las capas */
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Capa base del iPhone */
        #phone-layer {
            z-index: 1;
            transform: translateZ(0px); /* Plano de fondo */
        }

        /* Capa del Cover con animación de caída flotante */
        .layer-accessory {
            opacity: 0;
            z-index: 2;
            transform: translateZ(30px) scale(1.12); /* Flota ligeramente más arriba y más grande antes de entrar */
            filter: drop-shadow(0 0px 0px rgba(0,0,0,0));
        }

        /* Cuando se activa, cae y proyecta una sombra suave sobre el chasis del iPhone */
        .layer-accessory.active {
            opacity: 1;
            transform: translateZ(15px) scale(1);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.55));
        }

        /* Destello elegante de fondo */
        .glow-effect {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.15) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
        }


        /* 2. PANEL DE SELECCIÓN INFERIOR (BOTTOM SHEET) */
        .control-panel {
            background: rgba(20, 20, 22, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px 28px 0 0;
            padding: 24px 24px 100px 24px;
            display: flex;
            flex-direction: column;
            height: 48vh;
            z-index: 20;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 20px;
        }

        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            width: 20px;
            background: #0071e3;
            border-radius: 3px;
        }

        .steps-container {
            flex: 1;
            overflow-y: auto;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8e8e93;
            margin-bottom: 15px;
        }

        /* GRID DE BOTONES ESTILO APPLE STORE */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .option-item.selected {
            border-color: #0071e3;
            background: rgba(0, 113, 227, 0.12);
            box-shadow: 0 0 15px rgba(0, 113, 227, 0.1);
        }

        .option-title {
            font-weight: 500;
            font-size: 15px;
        }

        .option-desc {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 3px;
            display: block;
        }

        .option-price {
            font-weight: 600;
            color: #0071e3;
            font-size: 15px;
        }

        /* RESUMEN DE COMPRA */
        .summary-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .summary-line {
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            color: #8e8e93;
        }

        .summary-line span.val {
            color: #ffffff;
            font-weight: 500;
        }

        .summary-total {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 14px;
            margin-top: 14px;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        /* 3. SISTEMA DE NAVEGACIÓN INFERIOR */
        .footer-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 16px 24px 32px 24px;
            background: linear-gradient(to top, #0b0b0c 70%, rgba(11, 11, 12, 0) 100%);
            display: flex;
            justify-content: space-between;
            gap: 14px;
            z-index: 30;
        }

        .btn {
            flex: 1;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            border: none;
            text-align: center;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); }

        .btn-primary {
            background: #0071e3;
            color: #ffffff;
        }

        .btn-primary:hover { background: #147ce5; }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            box-shadow: 0 6px 20px rgba(37,211,102,0.25);
        }
        .btn-whatsapp:hover { background: #21be5b; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- MITAD SUPERIOR: CANVAS DE CAPAS SUPERPUESTAS (CON PARALLAX) -->
        <div class="viewer-box" id="tilt-zone">
            <div class="glow-effect" id="bg-glow"></div>
            
            <div class="canvas-container" id="canvas-card">
                <!-- Capa Fija del iPhone Base -->
                <img id="phone-layer" class="layer" src="https://raw.githubusercontent.com/joeldiaz171053-maker/krea/19bf28d20c063138f94624be48a8e9a4847b9ad4/13pm.png" alt="iPhone 13 Pro Max">
                
                <!-- Capa Volante Dinámica del Cover -->
                <img id="cover-layer" class="layer layer-accessory" src="" alt="Cover Protector">
            </div>
        </div>

        <!-- MITAD INFERIOR: MENÚ BOTTOM SHEET DESLIZABLE -->
        <div class="control-panel">
            <div class="header">
                <h1>TecnoTrade PTY</h1>
            </div>

            <div class="steps-indicator">
                <span class="step-dot active" id="dot-1"></span>
                <span class="step-dot" id="dot-2"></span>
                <span class="step-dot" id="dot-3"></span>
            </div>

            <div class="steps-container">
                
                <!-- PASO 1: MODELO -->
                <div class="step-content active" id="step-1">
                    <h2>1. Selecciona tu Dispositivo</h2>
                    <div class="options-list">
                        <button class="option-item selected" onclick="selectModel('iPhone 13 Pro Max', '#0071e3')">
                            <div>
                                <span class="option-title">iPhone 13 Pro Max</span>
                                <span class="option-desc">Acabado cristal e iluminación de contraste</span>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- PASO 2: ACCESORIOS (Aquí colocas tus nuevos links PNG transparentes sueltos) -->
                <div class="step-content" id="step-2">
                    <h2>2. Elige el Cover de tu Preferencia</h2>
                    <div class="options-list">
                        
                        <!-- Cover Elegante -->
                        <button class="option-item" id="btn-elegant" onclick="toggleCover('Cover Elegante Premium', 18.00, 'btn-elegant', 'https://raw.githubusercontent.com/joeldiaz171053-maker/krea/19bf28d20c063138f94624be48a8e9a4847b9ad4/cover13pm1.png', '#e0a96d')">
                            <div>
                                <span class="option-title">Cover Elegante Premium</span>
                                <span class="option-desc">Diseño exclusivo con textura reforzada</span>
                            </div>
                            <span class="option-price">$18.00</span>
                        </button>

                        <!-- Cover Silicona Soporte -->
                        <button class="option-item" id="btn-support" onclick="toggleCover('Silicona con Soporte', 15.00, 'btn-support', 'https://raw.githubusercontent.com/joeldiaz171053-maker/krea/19bf28d20c063138f94624be48a8e9a4847b9ad4/cover13pm2.png', '#2c3e50')">
                            <div>
                                <span class="option-title">Silicona con Soporte Integrado</span>
                                <span class="option-desc">Anillo desplegable funcional y antideslizante</span>
                            </div>
                            <span class="option-price">$15.00</span>
                        </button>

                        <!-- Cover Silicona Básico -->
                        <button class="option-item" id="btn-basic" onclick="toggleCover('Silicona Básica Slim', 10.00, 'btn-basic', 'https://raw.githubusercontent.com/joeldiaz171053-maker/krea/19bf28d20c063138f94624be48a8e9a4847b9ad4/cover13pm3.png', '#34495e')">
                            <div>
                                <span class="option-title">Silicona Básica Slim</span>
                                <span class="option-desc">Carcasa clásica suave de perfil ultradelgado</span>
                            </div>
                            <span class="option-price">$10.00</span>
                        </button>

                    </div>
                </div>

                <!-- PASO 3: RESUMEN -->
                <div class="step-content" id="step-3">
                    <h2>3. Revisa y Confirma tu Orden</h2>
                    <div class="summary-box">
                        <div class="summary-line"><span>iPhone:</span> <span class="val" id="sum-model">iPhone 13 Pro Max</span></div>
                        <div class="summary-line"><span>Accesorio:</span> <span class="val" id="sum-cover">Ninguno</span></div>
                        <div class="summary-total"><span>Total estimado:</span> <span id="sum-total">$0.00</span></div>
                    </div>
                </div>

            </div>

            <!-- BOTONES NAVEGACIÓN FLOTANTE -->
            <div class="footer-nav">
                <button class="btn btn-secondary" id="btn-back" onclick="changeStep(-1)" style="visibility: hidden;">Atrás</button>
                <button class="btn btn-primary" id="btn-next" onclick="changeStep(1)">Continuar</button>
                <a href="#" id="whatsapp-link" target="_blank" class="btn btn-primary btn-whatsapp" style="display: none;">Enviar Orden</a>
            </div>

        </div>
    </div>

    <script>
        let currentStep = 1;
        let selectedModel = "iPhone 13 Pro Max";
        let selection = { cover: { name: "Ninguno", price: 0 } };

        const coverLayer = document.getElementById("cover-layer");
        const bgGlow = document.getElementById("bg-glow");
        const tiltCard = document.getElementById("canvas-card");
        const tiltZone = document.getElementById("tilt-zone");

        // 1. EFECTO PARALLAX INTERACTIVO (FALSO 3D AL MOVER MOUSE O TOCAR)
        function handleTilt(x, y) {
            const width = tiltZone.offsetWidth;
            const height = tiltZone.offsetHeight;
            
            // Calculamos el ángulo basado en el centro de la pantalla
            const rotateX = -((y - height / 2) / height) * 24; // Ángulo de inclinación vertical
            const rotateY = ((x - width / 2) / width) * 24;   // Ángulo de inclinación horizontal
            
            tiltCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        // Evento para computadoras (Mouse)
        tiltZone.addEventListener("mousemove", (e) => {
            handleTilt(e.clientX, e.clientY);
        });

        // Evento para celulares (Dedo/Touch)
        tiltZone.addEventListener("touchmove", (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                handleTilt(touch.clientX, touch.clientY);
            }
        });

        // Restablecer posición suave cuando quitan el dedo o mouse
        function resetTilt() {
            tiltCard.style.transform = "rotateX(0deg) rotateY(0deg)";
        }
        tiltZone.addEventListener("mouseleave", resetTilt);
        tiltZone.addEventListener("touchend", resetTilt);


        // 2. LOGÍSTICA DE CAPAS DE ACCESORIOS SÚPER INMERSIVAS
        function toggleCover(name, price, elementId, imgUrl, accentColor) {
            const element = document.getElementById(elementId);
            
            if (selection.cover.name === name) {
                // Si ya está puesto, lo quitamos con animación de salida
                selection.cover = { name: "Ninguno", price: 0 };
                element.classList.remove("selected");
                
                coverLayer.classList.remove("active");
                bgGlow.style.background = "radial-gradient(circle, rgba(0, 113, 227, 0.15) 0%, rgba(0,0,0,0) 70%)";
            } else {
                // Quitamos selecciones previas
                document.querySelectorAll("#step-2 .option-item").forEach(el => el.classList.remove("selected"));
                
                selection.cover = { name: name, price: price };
                element.classList.add("selected");
                
                // Cambia la foto del cover suelto en la capa superior y activa la animación de caída
                coverLayer.setAttribute("src", imgUrl);
                coverLayer.classList.add("active");
                
                // Cambia dinámicamente el resplandor de fondo según el color del cover elegido
                bgGlow.style.background = `radial-gradient(circle, ${accentColor}33 0%, rgba(0,0,0,0) 70%)`;
            }
            
            updateSummaryData();
        }

        function selectModel(modelName, accentColor) {
            selectedModel = modelName;
            updateSummaryData();
        }

        // ARREGLO BOTÓN ATRÁS: Desmonta el accesorio inmediatamente
        function cleanVisualsOnBack() {
            selection.cover = { name: "Ninguno", price: 0 };
            document.querySelectorAll("#step-2 .option-item").forEach(el => el.classList.remove("selected"));
            coverLayer.classList.remove("active");
            bgGlow.style.background = "radial-gradient(circle, rgba(0, 113, 227, 0.15) 0%, rgba(0,0,0,0) 70%)";
            updateSummaryData();
        }

        function updateSummaryData() {
            document.getElementById("sum-model").innerText = selectedModel;
            document.getElementById("sum-cover").innerText = selection.cover.name + (selection.cover.price > 0 ? ` ($${selection.cover.price.toFixed(2)})` : "");
            
            const total = selection.cover.price;
            document.getElementById("sum-total").innerText = `$${total.toFixed(2)}`;
            buildWhatsAppLink(total);
        }

        function buildWhatsAppLink(total) {
            const phoneNumber = "50760000000"; // Tu número comercial de Panamá
            let message = `🔥 *¡Hola TecnoTrade PTY! Deseo realizar un pedido:*\\n\\n`;
            message += `📱 *Modelo:* ${selectedModel}\\n`;
            message += `📦 *Cover:* ${selection.cover.name}\\n\\n`;
            message += `💰 *Total del Pedido:* $${total.toFixed(2)}\\n\\n`;
            message += `📍 _Por favor confírmame disponibilidad para coordinar la entrega._`;
            
            const encodedMessage = encodeURIComponent(message);
            document.getElementById("whatsapp-link").setAttribute("href", `https://wa.me/${phoneNumber}?text=${encodedMessage}`);
        }

        function changeStep(direction) {
            // Si el usuario va hacia atrás desde el paso 2 al paso 1, desmontamos los accesorios puestos
            if (currentStep === 2 && direction === -1) {
                cleanVisualsOnBack();
            }

            currentStep += direction;
            if (currentStep < 1) currentStep = 1;
            if (currentStep > 3) currentStep = 3;
            
            document.querySelectorAll(".step-content").forEach(el => el.classList.remove("active"));
            document.getElementById(`step-${currentStep}`).classList.add("active");

            document.querySelectorAll(".step-dot").forEach(el => el.classList.remove("active"));
            for(let i = 1; i <= currentStep; i++) {
                document.getElementById(`dot-${i}`).classList.add("active");
            }
            
            document.getElementById("btn-back").style.visibility = (currentStep === 1) ? "hidden" : "visible";
            
            if (currentStep === 3) {
                document.getElementById("btn-next").style.display = "none";
                document.getElementById("whatsapp-link").style.display = "block";
                updateSummaryData(); 
            } else {
                document.getElementById("btn-next").style.display = "block";
                document.getElementById("whatsapp-link").style.display = "none";
            }
        }
    </script>
</body>
</html>
